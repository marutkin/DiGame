name: Deploy textjrpg-dasha to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: textjrpg-dasha/package-lock.json

      - name: Install & Build
        run: |
          cd textjrpg-dasha
          npm ci
          npm run build

      # Only configure and prepare Pages artifact on pushes to main.
      # On PRs we only validate the build (this acts as "preview" CI check).
      - name: Setup Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: textjrpg-dasha/dist

      # For PRs: upload the built dist as a regular artifact so you can download
      # and manually preview the game (or we can enhance this later with hosted previews).
      - name: Upload PR preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: preview-textjrpg-dasha-${{ github.event.pull_request.number }}
          path: textjrpg-dasha/dist
          retention-days: 7

  deploy:
    # Only deploy to GitHub Pages on pushes to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4